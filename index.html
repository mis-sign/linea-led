<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linea LED - Corporate Support Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary: #FF4500;
            --primary-hover: #DC3700;
            --bg-dark: #121212;
            --card-dark: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --border-color: #2D2D2D;
            --success: #00E676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .portal-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-dark);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header h1 span {
            color: var(--primary);
        }

        .header p {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .telemetry-badge {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: #252525;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: #2D2D2D;
        }

        .checkbox-group {
            display: grid;
            gap: 10px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            background: #252525;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: #2D2D2D;
        }

        .checkbox-item input {
            margin-right: 12px;
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        /* Attachment Field Styling */
        .file-upload-wrapper {
            position: relative;
            background: #252525;
            border: 1px dashed var(--border-color);
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-wrapper:hover {
            border-color: var(--primary);
            background: #2D2D2D;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-wrapper i {
            font-size: 24px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .file-upload-name {
            font-size: 12px;
            color: var(--primary);
            margin-top: 5px;
            font-weight: bold;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .btn-submit:disabled {
            background: #555555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="header">
            <h1>LINEA LED <span>PORTAL</span></h1>
            <p>Real-Time Signage Support Center</p>
        </div>

        <div class="telemetry-badge">
            <i class="fas fa-shield-alt"></i>
            <span>SECURE GEOSPATIAL NODE CONNECTED</span>
        </div>

        <form id="complaintForm">
            <!-- Warranty ID (Hidden/Pre-filled context) -->
            <input type="hidden" id="warrantyId" value="LINEA-LED-9981">

            <div class="form-group">
                <label>Contact Person Name *</label>
                <input type="text" id="clientName" class="form-control" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Active WhatsApp Mobile *</label>
                <input type="tel" id="contactPhone" class="form-control" placeholder="e.g. 8698755608" required>
            </div>

            <div class="form-group">
                <label>Signage Technical Fault Diagnosis *</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="fault" value="Complete LED Blackout">
                        <span>Complete LED Blackout</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="fault" value="Partial Dim Patches">
                        <span>Partial Dim Patches</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="fault" value="LED Module Dead">
                        <span>LED Module Dead</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="fault" value="Power Driver Failure">
                        <span>Power Driver Failure</span>
                    </label>
                </div>
            </div>

            <!-- Beautiful Attachment Option -->
            <div class="form-group">
                <label>Upload Fault Image / Site Proof (Optional)</label>
                <div class="file-upload-wrapper">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p style="font-size: 13px; color: var(--text-muted);">Click or Drag photo here to attach</p>
                    <input type="file" id="siteAttachment" accept="image/*" onchange="updateFileName()">
                    <div id="fileNameDisplay" class="file-upload-name"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">Submit Complaint</button>
        </form>
    </div>

    <script>
        // Aapka updated Render Live URL
        const BACKEND_URL = 'https://linea-led.onrender.com';

        // Attachment file ka naam display karne ke liye function
        function updateFileName() {
            const fileInput = document.getElementById('siteAttachment');
            const nameDisplay = document.getElementById('fileNameDisplay');
            if(fileInput.files.length > 0) {
                nameDisplay.textContent = "Attached: " + fileInput.files[0].name;
            } else {
                nameDisplay.textContent = "";
            }
        }

        // Form Submit Handler
        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = "Processing Cloud Sync...";

            // Checkboxes se selected faults nikalna
            const selectedFaults = [];
            document.querySelectorAll('input[name="fault"]:checked').forEach((cb) => {
                selectedFaults.push(cb.value);
            });

            if(selectedFaults.length === 0) {
                alert("Please select at least one Technical Fault Diagnosis.");
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Complaint";
                return;
            }

            // Data payload banana backend ke liye
            const payload = {
                warrantyId: document.getElementById('warrantyId').value,
                clientName: document.getElementById('clientName').value,
                contactName: document.getElementById('clientName').value,
                contactPhone: document.getElementById('contactPhone').value,
                issueReported: selectedFaults.join(', ')
            };

            try {
                // API Hit to Live Render Server
                const response = await fetch(`${BACKEND_URL}/api/register-complaint`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    alert(`Complaint Logged Successfully!\nYour Ticket ID is: #${result.data.id}`);
                    document.getElementById('complaintForm').reset();
                    document.getElementById('fileNameDisplay').textContent = "";
                } else {
                    alert("Server Error: " + result.message);
                }
            } catch (error) {
                console.error("Error syncing:", error);
                alert("Failed to sync with cloud. Please check internet connection.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Complaint";
            }
        });
    </script>
</body>
</html>
